name: Frontend CD

on:
  workflow_run:
    workflows: ["Frontend CI"]
    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: rajudruva2/eks-gitops-config
          token: ${{ secrets.GH_PAT }}
          path: gitops

      - name: Update Frontend Deployment
        run: |
          sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/e-commerce-frontend:${{ github.event.workflow_run.head_sha }}|g" gitops/apps/ecommerce/frontend/deployment.yml

      - name: Commit and Push Changes
        run: |
          cd gitops

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git pull origin main --rebase

          git add .

          git commit -m "Updated backend image to ${{ github.sha }}" || echo "No changes to commit"

          git push origin main
